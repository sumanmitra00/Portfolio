<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>

<body>
    <h2 align="center">Form in HTML </h2>
    <hr>
    <table align="center" border="1" cellspacing="2">
        <form action="">
            <tr>
                <td> First Name </td>
                <td><input type="text" name="" id=""></td> <br><br>
            </tr>

            <tr>
                <td> Last Name </td>
                <td><input type="text" name="" id=""></td> <br><br>
            </tr>

            <tr>
                <td> Phone Number</td>
                <td><input type="number" name="" id=""></td>
            </tr>

            <tr>
                <td> Gender </td>
                <td> <input type="radio" name="Gender" id="">Male <input type="radio" name="Gender" id="">Female </td>
            </tr>

            <tr>
                <td>Height</td>
                <td><input type="range" name="range" id=""></td>
            </tr>

            <tr>
                <td>File Upload</td>
                <td><input type="file" name="" id=""></td>
            </tr>

            <tr>
                <td>Date of Birth</td>
                <td><input type="datetime-local"></td>
            </tr>

            <tr>
                <td>Hobbies</td>
                <td><input type="checkbox" name="" value="">Cricket<input type="checkbox" name="" value="">Football</td>
            </tr>
            <tr>
                <td>Click to Submit the form </td>
                <td><input type="button" value="Submit" align="center"></td>
            </tr>
        </form>

    </table>




    </form>
</body>

</html>
